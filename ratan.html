      <style>
         .flower {
            position: fixed; 
            top: -50px; 
            font-size: 30px; /* Thoda bada size taaki 5 flowers acche se dikhein */
            user-select: none;
            pointer-events: none; /* Cards ke buttons kaam karte rahenge */
            z-index: 9999;        /* Cards ke upar dikhega */
            animation: fall linear infinite;
        }

        /* Speed aur path bilkul fix hai */
        @keyframes fall {
            0% {
                top: -50px;
                transform: translateX(0) rotate(0deg);
                opacity: 1;
            }
            100% {
                top: 105vh; 
                transform: translateX(50px) rotate(360deg);
                opacity: 0.6;
            }
        }
    </style>
 
    <script>
        // Flower ki types
        const flowers = ['🌸', '💮', '🌹', '🌺', '🌻'];
        
        // STRICT CONFIGURATION (Bilkul Fix)
        const flowerCount = 5; // Sirf 5 flowers girenge
        const fixSpeed = 7;    // Har flower 7 seconds me niche pahuchega (Fix Time)

        function createFlower(index) {
            const flower = document.createElement('div');
            flower.classList.add('flower');
            
            // Har ek number ko alag flower mil rha hai
            flower.innerText = flowers[index % flowers.length];
            
            // Screen par alag-alag jagah se girenge (Left se right ke beech me)
            // 5 flowers hain toh unhe screen par barabar baant diya hai (0%, 20%, 40%, 60%, 80%)
            flower.style.left = (index * 20) + Math.random() * 5 + 'vw';
            
            // Speed bilkul fix (7 seconds)
            flower.style.animationDuration = fixSpeed + 's';
            
            // Delay isliye taaki saare 1 saath na giren, aage peeche giren
            flower.style.animationDelay = (index * 1.2) + 's'; 

            document.body.appendChild(flower);
        }

        // Loop sirf 5 baar chalega aur fix 5 flowers banayega
        for (let i = 0; i < flowerCount; i++) {
            createFlower(i);
        }
    </script>

<script>
let canvas = document.getElementById("wmCanvas");
let ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let text = " पं रविंदर   | " + new Date().toLocaleString();

ctx.font = "20px Arial";
ctx.fillStyle = "rgba(0.3,0.3,0.3,0.3)";
ctx.rotate(-0.5);

for (let x = -500; x < canvas.width; x += 300) {
    for (let y = 0; y < canvas.height; y += 150) {
        ctx.fillText(text, x, y);
    }
}
</script>

    if (
      e.keyCode === 123 || // F12
      (e.ctrlKey && (e.keyCode === 85 || e.keyCode === 83 || e.keyCode === 80)) || // Ctrl+U, S, P
      (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74 || e.keyCode === 67)) // Ctrl+I/J/C
    ) {
      e.preventDefault();
      alert("Security Alert: Content is Protected!");
      return false;
    }
  });
   document.addEventListener('keyup', (e) => {
    if (e.key === 'PrintScreen') {
      navigator.clipboard.writeText(''); // क्लिपबोर्ड खाली करना
      alert('Screenshots are disabled!');
    }
  });
  setInterval(function() {
    const threshold = 160;
    if (window.outerWidth - window.innerWidth > threshold || window.outerHeight - window.innerHeight > threshold) {
      document.body.innerHTML = "<h2 style='text-align:center; color:red; margin-top:20%'>Security Breach! Please close Developer Tools to view content.</h2>";
    }
  }, 1000);
 </script>
